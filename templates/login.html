{% extends "base.html" %}
{% block title %}Login - Telegram Message Manager{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="display-4 text-primary mb-3"><i class="fas fa-lock"></i></div>
                        <h2 class="card-title">Admin Login</h2>
                        <p class="text-muted">Telegram Message Manager</p>
                    </div>
                    {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle"></i> {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endif %}
                    <form method="POST" class="needs-validation">
                        <div class="mb-3">
                            <label for="password" class="form-label"><i class="fas fa-key"></i> Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Enter admin password">
                            <small class="form-text text-muted">Default password: admin123 (change in .env file)</small>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100"><i class="fas fa-sign-in-alt"></i> Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
